name: Bug Report
description: Report a reproducible defect in LifeOS
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Clear description of the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Exact steps to reproduce.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Windows 11 / Node 20 / Browser"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Include terminal output, stack traces, screenshots, or network traces.
      render: shell

  - type: checkboxes
    id: verification
    attributes:
      label: Reporter Checklist
      options:
        - label: I verified this is reproducible on the latest branch.
          required: true
        - label: I included enough detail to reproduce the issue.
          required: true
